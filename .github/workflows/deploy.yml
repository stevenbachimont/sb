name: Déploiement Docker sur VPS

on:
  push:
    branches:
      - main
      - steven

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Récupérer tout l'historique pour les comparaisons

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run merge validation tests
        run: npm run test:unit -- --reporter=verbose test/merge.spec.ts

      - name: Validate merge quality
        run: |
          echo "🔍 Validation complète du merge..."
          node test/scripts/validate-merge.js

      - name: Check code quality
        run: |
          echo "🔍 Vérification de la qualité du code..."
          npm run check

  deploy:
    runs-on: ubuntu-latest
    needs: test # Le déploiement ne se lance que si les tests passent

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Déployer sur le VPS (build local + restart)
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /root/sb

            EXPECTED_SHA="${{ github.sha }}"
            BRANCH="${{ github.ref_name }}"

            echo "📥 Sync git → $BRANCH ($EXPECTED_SHA)"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            ACTUAL_SHA="$(git rev-parse HEAD)"
            echo "📌 HEAD VPS: $ACTUAL_SHA"
            if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
              echo "❌ SHA VPS ≠ SHA GitHub Actions"
              echo "   attendu: $EXPECTED_SHA"
              echo "   obtenu:  $ACTUAL_SHA"
              exit 1
            fi

            # Uniquement Docker Compose V2 (pas de fallback docker-compose v1 / API 1.43)
            if ! docker compose version >/dev/null 2>&1; then
              echo "❌ docker compose (V2) introuvable sur le VPS"
              exit 1
            fi

            echo "🛑 Arrêt des conteneurs du projet..."
            docker compose --profile edge down --remove-orphans

            echo "🔨 Build sans cache (service sb)..."
            docker compose build --no-cache sb

            echo "🚀 Redémarrage de l'app (port 3000)..."
            docker compose up -d sb

            # nginx Docker seulement si 80/443 sont libres (sinon proxy hôte déjà en place)
            if command -v ss >/dev/null 2>&1; then
              PORT80_BUSY="$(ss -ltn | awk '$4 ~ /:80$/ { print 1; exit }')"
            else
              PORT80_BUSY="$(netstat -ltn 2>/dev/null | awk '$4 ~ /:80$/ { print 1; exit }' || true)"
            fi

            if [ "${PORT80_BUSY:-}" = "1" ]; then
              echo "ℹ️ Port 80 déjà utilisé — nginx Docker ignoré (proxy hôte)"
            else
              echo "🌐 Ports libres — démarrage nginx Docker (profile edge)..."
              docker compose --profile edge up -d nginx
            fi

            echo "🔍 Vérification..."
            sleep 8
            docker compose ps
            docker compose ps --status running --services | grep -qx sb

            echo "🧹 Nettoyage images dangling..."
            docker image prune -f

            echo "✅ Déploiement terminé ($ACTUAL_SHA)"
